network:
  k_paths: 5                      # K-shortest paths to consider per (src, dst) pair
  topology: "nsfnet"              # nsfnet | geant2 | fat_tree
  polling_interval: 2.0           # Seconds between telemetry polls (Phase 2)

mm1k:
  buffer_capacity: 50             # K packets per switch port buffer
  base_arrival_rate: 100.0        # λ base (packets/sec)
  base_service_rate: 150.0        # μ base (packets/sec)

graph_transformer:
  hidden_dim: 256                 # Latent embedding dimension (increased 128→256 for more capacity)
  num_heads: 8                    # Multi-head attention heads (increased 4→8; 256/8=32 per head)
  num_layers: 4                   # Number of TransformerConv layers (increased 3→4; 4-hop receptive field)
  dropout: 0.15                   # Slightly increased from 0.1 to regularise larger capacity model

ppo:
  lr_actor: 1.0e-4                # Actor + encoder LR (reduced 3e-4→1e-4 for fine-grained updates near convergence)
  lr_critic: 5.0e-4               # Critic head LR (aligned closer to actor; was 1e-3)
  gamma: 0.99                     # Discount factor
  gae_lambda: 0.98                # GAE λ (increased 0.95→0.98; longer credit assignment for multi-hop routing)
  clip_epsilon: 0.1               # PPO clipping ε (tightened 0.2→0.1; prevents destructive large policy steps)
  update_epochs: 5                # PPO update epochs (reduced 10→5 to match tighter clip_epsilon)
  batch_size: 256                 # Mini-batch size (increased 64→256 for more stable gradient estimates)
  entropy_coef: 0.03              # Entropy bonus (increased 0.01→0.03; forces exploration from plateau)

training:
  offline_episodes: 50000         # Total training episodes
  max_steps_per_episode: 200      # Steps per episode before reset
  checkpoint_interval: 1000       # Save checkpoint every N episodes
  checkpoint_path: "checkpoints/"
  update_interval: 1024           # Rollout steps before each PPO update (base value; clamped by max_update_interval)
  max_update_interval: 8192       # Hard ceiling on RAM-aware update_interval inflation (was uncapped at 32768)
  compile_model: true             # torch.compile encoder+AC-net (15–40% speedup; set false to debug)
  num_workers: 0                  # Reserved: parallel env workers (0 = single-process; future feature)

# ── Topology-Specific Overrides ──────────────────────────────────────────────
# Values here are merged into the ppo/training blocks AFTER hardware scaling.
# Only the keys present here are overridden; all others use the shared defaults
# above.  This lets GEANT2 and NSFNET coexist without conflicting configs.
topology_overrides:
  nsfnet:
    # NSFNET (14 nodes, 21 links) — uses root-level defaults; no overrides needed.
    ppo: {}
    training: {}

  geant2:
    # GEANT2 (24 nodes, 37 links) — larger topology needs more exploration
    # and a slower decay horizon to match its higher episode count.
    ppo:
      entropy_coef: 0.05          # Higher than NSFNET (0.03) — forces exploration on larger action space
      gae_lambda: 0.99            # Longer credit assignment; GEANT2 avg path = 2.99 hops
      clip_epsilon: 0.15          # Slightly relaxed from 0.1 — allows larger policy steps during early exploration
    training:
      update_interval: 2048       # Larger rollout for 24-node graph; still safe with max_update_interval=8192

reward_weights:
  alpha1: 0.35                    # Throughput weight (reduced 0.4→0.35 to give room to delay)
  alpha2: 0.40                    # Delay weight (increased 0.3→0.4; OSPF wins on delay — target this directly)
  alpha3: 0.15                    # Packet loss weight (reduced 0.2→0.15; correlated with delay)
  alpha4: 0.10                    # Link utilization variance weight (unchanged; key differentiator vs OSPF)
  # ── Topology-aware routing penalty multipliers ───────────────────────────
  # Applied OUTSIDE the ×10 QoS scalar to prevent over-amplification.
  # Wide-area (NSFNET / GEANT2): soft penalties encourage path diversity.
  # Data-centre (Fat-Tree): larger values counteract ECMP sprawl / congestion.
  hop_weight: 0.02                # Cost per hop (NSFNET/GEANT2≈0.02, Fat-Tree≈0.05)
  congestion_weight: 1.0          # Cost per util unit above 0.7 (NSFNET/GEANT2≈1.0, Fat-Tree≈2.0)

controller:
  host: "127.0.0.1"
  rest_port: 8080
  openflow_port: 6633

agentic:
  # Choose any supported provider:
  #   gemini   | openai  | groq    | mistral |
  #   cohere   | together | ollama
  provider: "groq"              # ← change this to switch providers

  # Model name for the chosen provider — examples:
  #   gemini   → gemini-1.5-flash  (free)
  #   groq     → llama3-70b-8192   (free, fastest)
  #   mistral  → mistral-small-latest
  #   cohere   → command-r
  #   together → meta-llama/Llama-3-70b-chat-hf
  #   openai   → gpt-4o-mini
  #   ollama   → llama3  (local, no key needed)
  model: "openai/gpt-oss-120b"

  temperature: 0.1

  # Only used when provider = ollama (local inference, no API key needed)
  # Install: curl -fsSL https://ollama.com/install.sh | sh
  # Pull model: ollama pull llama3
  ollama_base_url: "http://localhost:11434"
